<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo della Terra - Live Audio Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Neural Thinking Mode - Inspired by image_05f189.jpg */
        .neural-bg {
            background-image: radial-gradient(circle at center, rgba(245, 158, 11, 0.15) 0%, rgba(28, 25, 23, 1) 70%);
            animation: neuralPulse 3s ease-in-out infinite alternate;
        }
        @keyframes neuralPulse {
            0% { opacity: 0.6; filter: hue-rotate(0deg) saturate(1); }
            100% { opacity: 1; filter: hue-rotate(15deg) saturate(1.3); }
        }
        /* Lightning filament pulsing effect */
        .filament-glow {
            filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.8));
        }
    </style>
</head>
<body class="bg-stone-950 text-stone-100 font-sans min-h-screen flex flex-col justify-between p-6 transition-all duration-700">

    <header class="text-center py-4 border-b border-stone-800/60">
        <h1 class="text-xs uppercase tracking-widest text-stone-500">Associazione ARTimi</h1>
        <p class="text-xl font-serif tracking-tight text-amber-500 mt-1">Museo della Terra</p>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center my-8 text-center relative">
        <!-- Neural Visualizer Container (Hidden by default, fades in when thinking/speaking) -->
        <div id="neural-container" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-700 w-full h-64 max-w-sm mx-auto">
            <!-- Animated Canvas replicating image_05f189.jpg neural nodes -->
            <canvas id="neuralCanvas" class="w-full h-full filament-glow"></canvas>
        </div>

        <div id="radar-status" class="w-24 h-24 rounded-full bg-stone-900 border border-stone-800 flex items-center justify-center mb-6 z-10 transition-all duration-500">
            <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-stone-600 transition-colors duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 100-6 3 3 0 000 6z" />
            </svg>
        </div>

        <h2 id="exhibit-title" class="text-2xl font-serif text-stone-300 z-10 duration-300">In Attesa di un Artefatto...</h2>
        <p id="exhibit-prompt" class="text-sm text-stone-500 max-w-xs mt-2 px-4 z-10">Avvicinati a un'opera d'arte esposta per iniziare la narrazione.</p>
        
        <!-- Standard Native HTML5 Audio Deck hidden from sight -->
        <audio id="native-audio-player" class="hidden"></audio>
    </main>

    <footer class="w-full max-w-md mx-auto z-10">
        <button id="start-btn" onclick="initializeMuseumRadar()" class="w-full bg-stone-900 border border-amber-600/30 text-amber-500/90 font-medium py-4 px-6 rounded-xl transition duration-300 shadow-md tracking-wide uppercase text-xs hover:border-amber-500">
            Attiva Guida Vocale
        </button>
        <p class="text-[10px] text-center text-stone-700 mt-4 tracking-wider">CONVERSATIONAL LOCAL PROCESSING VIA LUTHER</p>
    </footer>

    <script>
    const API_URL = "https://cannon-mystify-growl.ngrok-free.dev"; 
    const audioPlayer = document.getElementById('native-audio-player');
    let canvas, ctx, animationFrameId;
    let neuralNodes = [];

    // Initialize the canvas animation to match image_05f189.jpg
    function setupNeuralCanvas() {
        canvas = document.getElementById('neuralCanvas');
        ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        
        neuralNodes = [];
        // Generate interconnected star-like node points
        for (let i = 0; i < 12; i++) {
            neuralNodes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 3 + 2,
                speedX: (Math.random() - 0.5) * 0.4,
                speedY: (Math.random() - 0.5) * 0.4,
                pulse: Math.random() * Math.PI
            });
        }
    }

    function drawNeuralNetwork(isSpeaking = false, volume = 1) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const speedMultiplier = isSpeaking ? 2.5 : 1.0;
        
        // Draw the synaptic web lines
        ctx.strokeStyle = `rgba(245, 158, 11, ${isSpeaking ? 0.25 : 0.12})`;
        ctx.lineWidth = 1;
        for (let i = 0; i < neuralNodes.length; i++) {
            for (let j = i + 1; j < neuralNodes.length; j++) {
                const dist = Math.hypot(neuralNodes[i].x - neuralNodes[j].x, neuralNodes[i].y - neuralNodes[j].y);
                if (dist < 120) {
                    ctx.beginPath();
                    ctx.moveTo(neuralNodes[i].x, neuralNodes[i].y);
                    ctx.lineTo(neuralNodes[j].x, neuralNodes[j].y);
                    ctx.stroke();
                }
            }
        }

        // Draw glowing star clusters (reproducing the glowing points in image_05f189.jpg)
        neuralNodes.forEach(node => {
            node.x += node.speedX * speedMultiplier;
            node.y += node.speedY * speedMultiplier;
            node.pulse += 0.03 * speedMultiplier;

            // Keep bounds clean
            if (node.x < 0 || node.x > canvas.width) node.speedX *= -1;
            if (node.y < 0 || node.y > canvas.height) node.speedY *= -1;

            const scale = 1 + Math.sin(node.pulse) * 0.4 * volume;
            
            // Outer golden plasma glow
            let gradient = ctx.createRadialGradient(node.x, node.y, 1, node.x, node.y, 25 * scale);
            gradient.addColorStop(0, 'rgba(251, 191, 36, 0.8)');
            gradient.addColorStop(0.2, 'rgba(245, 158, 11, 0.3)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(node.x, node.y, 25 * scale, 0, Math.PI * 2);
            ctx.fill();

            // Bright white-hot core
            ctx.fillStyle = '#fffdfa';
            ctx.beginPath();
            ctx.arc(node.x, node.y, node.radius * scale, 0, Math.PI * 2);
            ctx.fill();
        });

        animationFrameId = requestAnimationFrame(() => drawNeuralNetwork(isSpeaking, volume));
    }

    async function initializeMuseumRadar() {
        const startBtn = document.getElementById('start-btn');
        setupNeuralCanvas();
        
        startBtn.textContent = "Radar Attivo - Esplora...";
        startBtn.disabled = true;
        startBtn.className = "w-full bg-stone-900 border border-stone-800 text-stone-600 font-medium py-4 px-6 rounded-xl cursor-not-allowed uppercase text-xs tracking-wide";
        
        // Trigger conversation
        fetchAudioNarration('PENDING_SHELLY_ID_1');
    }

    async function fetchAudioNarration(beaconId) {
        const titleEl = document.getElementById('exhibit-title');
        const promptEl = document.getElementById('exhibit-prompt');
        const neuralContainer = document.getElementById('neural-container');
        const micIcon = document.getElementById('mic-icon');
        const radarStatus = document.getElementById('radar-status');

        titleEl.textContent = "Luther sta Riflettendo...";
        promptEl.textContent = "L'artefatto sta elaborando un pensiero storico personalizzato...";
        
        // Activate "Thinking Grid Overlay"
        document.body.classList.add('neural-bg');
        neuralContainer.style.opacity = "1";
        radarStatus.className = "w-24 h-24 rounded-full bg-amber-950/40 border border-amber-500/40 flex items-center justify-center mb-6 z-10 duration-500 filament-glow";
        micIcon.className = "h-10 w-10 text-amber-500";
        
        // Start running background neural animation loop
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        drawNeuralNetwork(false, 1.0);

        try {
            const response = await fetch(`${API_URL}/api/interact`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    beacon_id: beaconId,
                    user_input: "Presentati e raccontami la tua storia."
                })
            });

            if (!response.ok) throw new Error("Connection dropped.");

            // 1. Get the raw array buffer directly from Luther's response
            const arrayBuffer = await response.arrayBuffer();
            
            // 2. Decode the standard WAV file directly into the phone's native hardware mixer
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const decodedBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            // 3. Speed up the neural lights to demonstrate live playback execution
            cancelAnimationFrame(animationFrameId);
            drawNeuralNetwork(true, 1.5);

            titleEl.textContent = "Il Torchio sta Parlando";
            promptEl.textContent = "Ascolta il racconto dell'artefatto secolare.";

            // 4. Create an audio source node and map it straight to the speakers
            const source = audioCtx.createBufferSource();
            source.buffer = decodedBuffer;
            source.connect(audioCtx.destination);
            source.start(0);

            // 5. Clean up the UI automatically when the track naturally runs out of samples
            source.onended = () => {
                // Return interface to a restful state
                cancelAnimationFrame(animationFrameId);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                neuralContainer.style.opacity = "0";
                document.body.classList.remove('neural-bg');
                
                radarStatus.className = "w-24 h-24 rounded-full bg-stone-900 border border-stone-800 flex items-center justify-center mb-6 z-10 duration-500";
                micIcon.className = "h-10 w-10 text-stone-600";
                titleEl.textContent = "Artefatto Sintonizzato";
                promptEl.textContent = "L'interazione è andata a buon fine. Rimani vicino per continuare.";
                
                audioCtx.close(); // Close the hardware audio bridge to save power
            };

        } catch (err) {
            console.error(err);
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            neuralContainer.style.opacity = "0";
            document.body.classList.remove('neural-bg');
            radarStatus.className = "w-24 h-24 rounded-full bg-stone-900 border border-red-900 flex items-center justify-center mb-6 z-10";
            micIcon.className = "h-10 w-10 text-red-600";
            titleEl.textContent = "Errore di Connessione";
            promptEl.textContent = "Impossibile caricare il pensiero dell'artefatto.";
        }
    }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo della Terra - Live Audio Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulsing-glow {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.98); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.98); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-stone-900 text-stone-100 font-sans min-h-screen flex flex-col justify-between p-6">

    <header class="text-center py-4 border-b border-stone-800">
        <h1 class="text-xs uppercase tracking-widest text-stone-400">Associazione ARTimi</h1>
        <p class="text-xl font-serif tracking-tight text-amber-500 mt-1">Museo della Terra</p>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center my-8 text-center">
        <div id="radar-status" class="w-24 h-24 rounded-full bg-stone-800 flex items-center justify-center mb-6 transition-all duration-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-stone-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 100-6 3 3 0 000 6z" />
            </svg>
        </div>

        <h2 id="exhibit-title" class="text-2xl font-serif text-stone-200 duration-300">In Attesa di un Artefatto...</h2>
        <p id="exhibit-prompt" class="text-sm text-stone-400 max-w-xs mt-2 px-4">Avvicinati a un'opera d'arte esposta per iniziare la narrazione.</p>
    </main>

    <footer class="w-full max-w-md mx-auto">
        <button id="start-btn" onclick="initializeMuseumRadar()" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-medium py-4 px-6 rounded-xl transition duration-200 shadow-lg tracking-wide uppercase text-xs">
            Attiva Guida Vocale
        </button>
        <p class="text-[10px] text-center text-stone-600 mt-4 tracking-wider">SECURE ENCRYPTED LOCAL STREAM VIA LUTHER</p>
    </footer>

    <script>
    const API_URL = "https://cannon-mystify-growl.ngrok-free.dev"; 
    
    // Global web audio setup using native mobile hardware rates
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let nextStartTime = audioCtx.currentTime;

    async function initializeMuseumRadar() {
        const startBtn = document.getElementById('start-btn');
        try {
            console.log("Bypassing Bluetooth and triggering a simulated artifact encounter...");
            
            startBtn.textContent = "Radar Attivo - Esplora il Museo";
            startBtn.disabled = true;
            startBtn.className = "w-full bg-stone-800 text-stone-500 font-medium py-4 px-6 rounded-xl cursor-not-allowed uppercase text-xs tracking-wide";
            document.getElementById('radar-status').classList.add('pulsing-glow', 'bg-red-950', 'text-red-400');

            // Force mobile audio systems to wake up inside user interaction event
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            fetchAudioNarration('PENDING_SHELLY_ID_1');

        } catch (error) {
            console.error("Simulation failed:", error);
        }
    }

    async function fetchAudioNarration(beaconId) {
        const titleEl = document.getElementById('exhibit-title');
        const promptEl = document.getElementById('exhibit-prompt');
        
        titleEl.textContent = "Connessione all'Artefatto...";
        promptEl.textContent = "Luther sta elaborando la voce narrante in tempo reale...";

        try {
            const response = await fetch(`${API_URL}/api/interact`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    beacon_id: beaconId,
                    user_input: "Presentati e raccontami la tua storia."
                })
            });

            if (!response.ok) throw new Error("Server transmission error.");

            titleEl.textContent = "Ascolto in Corso";
            promptEl.textContent = "Il Torchio Vinario sta parlando...";

            const reader = response.body.getReader();
            nextStartTime = audioCtx.currentTime; // Reset timeline sync anchor

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                if (value && value.byteLength > 0) {
                    // Correct structural parsing of raw 16-bit PCM bytes
                    const int16Array = new Int16Array(value.buffer, value.byteOffset, value.byteLength / 2);
                    
                    // Force browser mixer to handle the translation from native 22050Hz upward
                    const audioBuffer = audioCtx.createBuffer(1, int16Array.length, 22050);
                    const channelData = audioBuffer.getChannelData(0);
                    
                    for (let i = 0; i < int16Array.length; i++) {
                        channelData[i] = int16Array[i] / 32768.0;
                    }
                    
                    const source = audioCtx.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(audioCtx.destination);
                    
                    if (nextStartTime < audioCtx.currentTime) {
                        nextStartTime = audioCtx.currentTime;
                    }
                    
                    source.start(nextStartTime);
                    nextStartTime += audioBuffer.duration;
                }
            }

            titleEl.textContent = "Artefatto Sintonizzato";
            promptEl.textContent = "Rimani vicino all'oggetto per interagire ancora o spostati per ascoltarne un altro.";

        } catch (err) {
            console.error("Pipeline breakdown:", err);
            titleEl.textContent = "Errore di Sintonizzazione";
            promptEl.textContent = "Impossibile collegarsi a Luther. Riprova.";
        }
    }
    </script>
</body>
</html>
